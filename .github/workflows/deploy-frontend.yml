name: Deploy Frontend (Azure Blob Storage)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'         # Only runs when frontend files change
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Upload Frontend to Azure Blob Storage

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Upload frontend files to Azure Blob $web container (static website)
      - name: Upload to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name lumorastorage01 \
              --source frontend \
              --destination '$web' \
              --overwrite true \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      # 3. Print the live URL
      - name: Print live URL
        run: |
          echo "✅ Frontend deployed!"
          echo "🌐 URL: https://lumorastorage01.z28.web.core.windows.net/"
